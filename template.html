<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA HTML Template</title>

<link rel="icon" href="favicon.png">
<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div id="loader">
  <div class="spinner"></div>
</div>

<div id="particles"></div>
<div class="cursor"></div>

<header class="navbar">
  <div class="nav-box">
    <h2 class="logo">NOVA</h2>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <ul class="menu" id="menu">
      <li><a href="#hero">Home</a></li>
      <li><a href="#features">Features</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact</a></li>
      <li><button onclick="toggleTheme()" class="theme-btn">🌙</button></li>
    </ul>
  </div>
</header>

<section class="hero reveal" id="hero">
  <h1>Build Modern Websites</h1>
  <p>Premium ThemeForest HTML Template</p>
  <button class="glow-btn">Get Started</button>
</section>

<section class="features reveal" id="features">
  <h2 class="section-title">Our Features</h2>
  <div class="feature-box">
    <div class="card">⚡ Fast Performance</div>
    <div class="card">📱 Responsive Design</div>
    <div class="card">🎨 Easy Customization</div>
  </div>
</section>

<section class="about reveal" id="about">
  <div class="about-box">
    <div>
      <h2>About Nova</h2>
      <p>This is modern, clean and beginner friendly.</p>
      <button class="glow-btn">Learn More</button>
    </div>
    <img src="images/about.png">
  </div>
</section>

<section class="contact reveal" id="contact">
  <h2 class="section-title">Contact Us</h2>

  <form id="contact-form">
    <input type="text" name="from_name" placeholder="Your Name" required>
    <input type="email" name="from_email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Message" required></textarea>
    <button class="glow-btn">Send Message</button>
  </form>
</section>

<footer class="footer">
  © 2026 Nova Template
</footer>

<button id="topBtn" onclick="scrollTop()">↑</button>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="js/main.js"></script>

</body>
</html>
